name: CI

on:
  push:
    branches: [ "trunk", "main", "**" ]
  pull_request:
    branches: [ "trunk", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config libssl-dev git php-cli python3 python3-pip libtbb-dev libopus-dev meson

      - name: Install Composer and PHP deps (if present)
        run: |
          if [ -f composer.json ]; then
            php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
            php composer-setup.php --install-dir=/usr/local/bin --filename=composer
            composer install --no-interaction --no-progress
          else
            echo "No composer.json found, skipping composer step"
          fi

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..

      - name: Build
        run: |
          cd build
          cmake --build . --config Release -- -j$(nproc)
          mkdir install
          cmake --install . --prefix install

      - name: Run tests (if any)
        run: |
          if [ -f build/CTestTestfile.cmake ]; then
            cd build
            ctest --output-on-failure
          else
            echo "No tests found"
          fi

      - name: Deploy (if on trunk)
        if: github.ref == 'refs/heads/trunk'
        run: |
          echo "Deploying application..."
          # Install SSH key
          mkdir -p ~/.ssh
          echo "${{ secrets.HOST_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Create zip with only necessary files
          cd build/install
          zip -r deploy.zip .
          ls -lh deploy.zip

          # Copy zip to server
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy.zip ${{ secrets.HOST_USERNAME }}@${{ secrets.HOST_HOSTNAME }}:~/deploys/Dash-N-Bark/

          # Kill previous instance, extract, and start new one
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.HOST_USERNAME }}@${{ secrets.HOST_HOSTNAME }} << 'EOF'
            pkill -f Dash-N-Bark || true
            sleep 60
            cd ~/deploys/Dash-N-Bark
            unzip -o deploy.zip
            rm deploy.zip
            mkdir -p logs
            nohup ./bin/Dash-N-Bark > "logs/output_$(date +%Y%m%d_%H%M%S).log" 2>&1 &
          EOF
